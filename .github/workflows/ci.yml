name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Run Workspace Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "x86_64-unknown-linux-gnu" # share with build x86_64 job

      - name: Rust Cargo Tests
        run: cargo test --workspace --locked

  build:
    name: Build and upload lsserver
    needs: test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            features: ""
          - target: aarch64-unknown-linux-gnu
            features: "--features gpio"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install cross compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build lsserver
        run: cargo build --release -p lsserver --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Upload lsserver
        uses: actions/upload-artifact@v7
        with:
          name: lsserver-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/lsserver
